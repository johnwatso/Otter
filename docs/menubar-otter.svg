<svg width="40" height="28" viewBox="0 0 40 28" xmlns="http://www.w3.org/2000/svg">
  <!-- Template image: only alpha matters. Eyes and muzzle are cut out of the
       silhouette via mask so they are truly transparent, not white. -->
  <defs>
    <mask id="face-cutouts">
      <rect width="40" height="28" fill="black"/>
      <!-- ears -->
      <circle cx="6.6" cy="6" r="4.5" fill="white"/>
      <circle cx="33.4" cy="6" r="4.5" fill="white"/>
      <!-- head -->
      <ellipse cx="20" cy="15" rx="17.2" ry="11.8" fill="white"/>
      <!-- eye holes -->
      <circle cx="12.4" cy="11.4" r="2.4" fill="black"/>
      <circle cx="27.6" cy="11.4" r="2.4" fill="black"/>
      <!-- muzzle hole -->
      <ellipse cx="20" cy="19.4" rx="11" ry="5.8" fill="black"/>
    </mask>
  </defs>
  <rect width="40" height="28" fill="#000000" mask="url(#face-cutouts)"/>
  <!-- nose (inside the muzzle hole) -->
  <path d="M15.5 17.4 Q15.5 15.9 17.2 15.9 L22.8 15.9 Q24.5 15.9 24.5 17.4 Q24.5 19.1 21.6 20.7 Q20 21.6 18.4 20.7 Q15.5 19.1 15.5 17.4 Z" fill="#000000"/>
  <!-- mouth -->
  <g fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round">
    <path d="M20 21.2 L20 22.1"/>
    <path d="M20 22.1 Q19.2 24.1 16.2 24.2"/>
    <path d="M20 22.1 Q20.8 24.1 23.8 24.2"/>
  </g>
</svg>
