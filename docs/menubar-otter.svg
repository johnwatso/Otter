<svg width="46" height="28" viewBox="0 0 46 28" xmlns="http://www.w3.org/2000/svg">
  <!-- Template image: only alpha matters. Eyes and muzzle are cut out of the
       silhouette via mask so they are truly transparent, not white. -->
  <defs>
    <mask id="face-cutouts">
      <rect width="46" height="28" fill="black"/>
      <!-- ears -->
      <circle cx="10.2" cy="5.4" r="4" fill="white"/>
      <circle cx="35.8" cy="5.4" r="4" fill="white"/>
      <!-- head: wide and flat -->
      <ellipse cx="23" cy="15.2" rx="18.2" ry="11.4" fill="white"/>
      <!-- eye holes -->
      <circle cx="15.6" cy="11.6" r="2.3" fill="black"/>
      <circle cx="30.4" cy="11.6" r="2.3" fill="black"/>
      <!-- muzzle hole -->
      <ellipse cx="23" cy="19.5" rx="11.6" ry="5.7" fill="black"/>
    </mask>
  </defs>
  <rect width="46" height="28" fill="#000000" mask="url(#face-cutouts)"/>
  <!-- whiskers, extending past the cheeks -->
  <g fill="none" stroke="#000000" stroke-width="1.8" stroke-linecap="round">
    <path d="M6.6 14.2 Q3 12.9 1.1 11.9"/>
    <path d="M6.9 17.4 Q3.2 17.1 1.0 16.6"/>
    <path d="M39.4 14.2 Q43 12.9 44.9 11.9"/>
    <path d="M39.1 17.4 Q42.8 17.1 45.0 16.6"/>
  </g>
  <!-- nose (inside the muzzle hole) -->
  <path d="M18.2 17.5 Q18.2 16 20 16 L26 16 Q27.8 16 27.8 17.5 Q27.8 19.2 24.7 20.8 Q23 21.7 21.3 20.8 Q18.2 19.2 18.2 17.5 Z" fill="#000000"/>
  <!-- mouth -->
  <g fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round">
    <path d="M23 21.3 L23 22.2"/>
    <path d="M23 22.2 Q22.2 24.2 19.2 24.3"/>
    <path d="M23 22.2 Q23.8 24.2 26.8 24.3"/>
  </g>
</svg>
