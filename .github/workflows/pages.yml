name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "docs/appcast.xml"
      - "docs/release-notes/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      # Sparkle's appcast and release notes are generated into docs/ by
      # shiphook, but the site itself lives in website/. Stage both so the
      # update feed is served from the same origin as the website.
      - name: Stage site
        run: |
          mkdir -p _site
          cp -R website/. _site/
          cp docs/appcast.xml _site/appcast.xml
          cp -R docs/release-notes _site/release-notes

      - name: Upload website
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
