name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build universal macOS 15+ app
        run: |
          xcodebuild build \
            -project Otter.xcodeproj \
            -scheme Otter \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            ARCHS='arm64 x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=YES

      - name: Test
        run: |
          xcodebuild test \
            -project Otter.xcodeproj \
            -scheme Otter \
            -destination 'platform=macOS' \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=YES
