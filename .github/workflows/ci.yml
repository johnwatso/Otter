name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild build \
            -project Otter.xcodeproj \
            -scheme Otter \
            -configuration Debug \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=YES

      - name: Test
        run: |
          xcodebuild test \
            -project Otter.xcodeproj \
            -scheme Otter \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=YES
