name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Developer ID signing and notarization run only when the secrets are
      # configured (DEVELOPER_ID_P12, DEVELOPER_ID_P12_PASSWORD, DEVELOPER_ID_IDENTITY,
      # NOTARY_APPLE_ID, NOTARY_TEAM_ID, NOTARY_PASSWORD). Without them the build
      # is ad-hoc signed: fine for personal use, Gatekeeper will warn other users.
      - name: Detect signing secrets
        id: signing
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
        run: |
          if [ -n "$DEVELOPER_ID_P12" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$DEVELOPER_ID_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$DEVELOPER_ID_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm "$RUNNER_TEMP/cert.p12"

      - name: Build Release
        env:
          SIGNING_ENABLED: ${{ steps.signing.outputs.enabled }}
          DEVELOPER_ID_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Sparkle compares CFBundleVersion, so every release needs a higher
          # build number; the commit count is monotonic.
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          IDENTITY="-"
          if [ "$SIGNING_ENABLED" = "true" ]; then
            IDENTITY="$DEVELOPER_ID_IDENTITY"
          fi
          xcodebuild build \
            -project Otter.xcodeproj \
            -scheme Otter \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            ARCHS='arm64 x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="$IDENTITY" \
            CODE_SIGNING_ALLOWED=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime"

      - name: Create DMG
        run: |
          STAGING="$RUNNER_TEMP/dmg"
          mkdir -p "$STAGING" dist
          cp -R build/Build/Products/Release/Otter.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "Otter" -srcfolder "$STAGING" -ov -format UDZO "dist/Otter-${GITHUB_REF_NAME#v}.dmg"

      - name: Notarize DMG
        if: steps.signing.outputs.enabled == 'true'
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          DMG="dist/Otter-${GITHUB_REF_NAME#v}.dmg"
          xcrun notarytool submit "$DMG" \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG"

      # Sparkle's SUFeedURL points at releases/latest/download/appcast.xml, so
      # each release ships its own EdDSA-signed appcast next to the DMG.
      - name: Generate Sparkle appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          KEY_FILE="$RUNNER_TEMP/sparkle_ed_key"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          GENERATE_APPCAST="$(find build/SourcePackages/artifacts -type f -name generate_appcast | head -1)"
          "$GENERATE_APPCAST" \
            --ed-key-file "$KEY_FILE" \
            --download-url-prefix "https://github.com/johnwatso/Otter/releases/download/$GITHUB_REF_NAME/" \
            -o dist/appcast.xml \
            dist
          rm "$KEY_FILE"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/Otter-${GITHUB_REF_NAME#v}.dmg" \
            dist/appcast.xml \
            --title "Otter $GITHUB_REF_NAME" \
            --generate-notes
